<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroDayWear | Deployment Terminal</title>
    <style>
        body { background-color: #000; margin: 0; overflow: hidden; color: #0f0; font-family: 'Courier New', Courier, monospace; font-size: 18px; }
        #terminal { width: 100vw; height: 100vh; padding: 20px; box-sizing: border-box; overflow-y: auto; position: relative; z-index: 1; }
        #history { white-space: pre-wrap; line-height: 1.4; margin-bottom: 10px; }
        .input-line { display: flex; align-items: center; }
        .prompt { color: #0f0; margin-right: 10px; font-weight: bold; }
        #cmd { background: transparent; border: none; color: #0f0; font-family: inherit; font-size: inherit; outline: none; flex: 1; caret-color: #0f0; }
        
        /* CRT Tarama Çizgisi Efekti */
        #terminal::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 2px, 3px 100%; pointer-events: none; z-index: 2;
        }

        /* Görsel Pop-up (Visual Decryption) Stilleri */
        #visual-popup {
            display: none; /* Başlangıçta gizli */
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 400px; background: rgba(0, 15, 0, 0.95); border: 3px solid #0f0;
            padding: 20px; box-sizing: border-box; z-index: 100;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.5); text-align: center;
        }
        #visual-popup.active { display: block; animation: popupIn 0.3s ease-out; }
        #popup-image { width: 100%; border: 1px solid #0f0; margin-bottom: 15px; }
        #popup-info { font-size: 16px; line-height: 1.4; }
        .close-btn { position: absolute; top: 5px; right: 10px; color: #0f0; cursor: pointer; font-weight: bold; font-size: 20px; }
        .close-btn:hover { color: #fff; }

        @keyframes popupIn { from { transform: translate(-50%, -50%) scale(0.8); opacity: 0; } to { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div id="terminal">
    <div id="history">ZeroDay_OS v2.6.0-STABLE (c) 2026 TR_HUB
Type 'help' to begin infiltration...</div>
    <div class="input-line">
        <span class="prompt">guest@zerodaywear:~$</span>
        <input type="text" id="cmd" autofocus autocomplete="off" spellcheck="false">
    </div>
</div>

<div id="visual-popup">
    <span class="close-btn" onclick="closePopup()">[X]</span>
    <div style="color:#0f0; font-weight:bold; margin-bottom:10px;">[ VISUAL_DECRYPTION ]</div>
    <img id="popup-image" src="" alt="Product Visual">
    <div id="popup-info"></div>
</div>

<script>
    const input = document.getElementById('cmd');
    const history = document.getElementById('history');
    const terminal = document.getElementById('terminal');
    const popup = document.getElementById('visual-popup');
    const popupImg = document.getElementById('popup-image');
    const popupInfo = document.getElementById('popup-info');

    // Ürün Veritabanı (Burayı NOWPayments linkinle güncelle kanka)
    const products = {
        'payload-v1.0': {
            name: 'PAYLOAD v1.0: INFILTRATE & SECURE',
            price: '$20.68',
            // GitHub'daki görselin ismi tam olarak bu olmalı: infiltrate secure.jpg
            image: 'infiltrate secure.jpg', 
            desc: 'Heavy cotton, oversized fit, encrypted graphics.',
            paymentLink: 'https://nowpayments.io/payment/YOUR_LINK_HERE' 
        }
    };

    input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            const val = input.value.trim();
            const [cmd, arg] = val.split(' ');
            
            history.innerHTML += `\n<span style="color:#008800">guest@zerodaywear:~$ ${val}</span>\n`;
            
            // Komut İşleme Mantığı
            if (cmd === 'ls') {
                history.innerHTML += `[FILE] payload-v1.0\n[DIR] about\n`;
            } else if (cmd === 'help') {
                history.innerHTML += `Commands: ls, info <item>, buy <item>, clear, help\n`;
            } else if (cmd === 'info') {
                if (products[arg]) {
                    history.innerHTML += `DECRYPTING VISUAL DATA FOR ${arg}... Done.\n`;
                    openPopup(arg); // Pop-up'ı aç
                } else {
                    history.innerHTML += `Error: Item '${arg}' not found in database.\n`;
                }
            } else if (cmd === 'buy') {
                if (products[arg]) {
                    history.innerHTML += `<span style="color:#f2a900">[!] REDIRECTING TO SECURE CRYPTO NODE...</span>\n`;
                    setTimeout(() => { window.location.href = products[arg].paymentLink; }, 2000);
                } else {
                    history.innerHTML += `Error: Item '${arg}' not found in database.\n`;
                }
            } else if (cmd === 'clear') {
                history.innerHTML = '';
                closePopup(); // Clear komutu pop-up'ı da kapatsın
            } else {
                history.innerHTML += `Command '${cmd}' not found.\n`;
            }
            
            input.value = '';
            terminal.scrollTo(0, terminal.scrollHeight);
        }
    });

    // Pop-up Fonksiyonları
    function openPopup(productKey) {
        const prod = products[productKey];
        popupImg.src = prod.image;
        popupInfo.innerHTML = `<b>${prod.name}</b><br>Price: ${prod.price}<br>${prod.desc}`;
        popup.classList.add('active');
        input.blur(); // Pop-up açıkken terminal inputundan odağı çek
    }

    function closePopup() {
        popup.classList.remove('active');
        input.focus(); // Pop-up kapanınca terminale odaklan
    }

    // Sayfaya tıklayınca inputa odaklan (pop-up açık değilse)
    document.addEventListener('click', (e) => {
        if (!popup.classList.contains('active')) {
            input.focus();
        }
    });
</script>
</body>
</html>
