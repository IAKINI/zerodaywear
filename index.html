<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroDayWear | OS v2.9.7-GOLD</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; margin: 0; overflow: hidden; font-size: 18px; }
        #matrix-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; opacity: 0.12; filter: blur(1px); pointer-events: none; }

        #terminal { 
            width: 100vw; height: 100vh; padding: 20px; box-sizing: border-box; 
            overflow-y: auto; position: relative; z-index: 1; display: none;
        }

        /* --- TERMINAL GLITCH --- */
        @keyframes glitch-anim {
            0% { transform: translate(0); }
            20% { transform: translate(-5px, 2px) skew(2deg); filter: hue-rotate(90deg); }
            40% { transform: translate(5px, -2px); }
            60% { transform: translate(-2px, 2px); }
            100% { transform: translate(0); }
        }
        .glitching { animation: glitch-anim 0.2s linear infinite; color: #fff !important; text-shadow: 2px 0 red, -2px 0 blue; }

        #history { white-space: pre-wrap; line-height: 1.5; margin-bottom: 10px; padding-right: 270px; }
        .input-line { display: flex; align-items: center; padding-right: 270px; }
        #cmd { background: transparent; border: none; color: #0f0; font-family: inherit; font-size: inherit; outline: none; flex: 1; caret-color: #0f0; }
        .prompt { font-weight: bold; margin-right: 5px; color: #0f0; }
        
        #side-panel { position: fixed; top: 20px; right: 20px; width: 240px; z-index: 10; display: none; }
        #live-feed { border: 1px solid #f00; padding: 10px; background: rgba(20, 0, 0, 0.85); font-size: 12px; margin-bottom: 10px; color: #ff4444; text-transform: uppercase; border-radius: 2px; }
        #leaderboard { border: 1px dashed #0f0; padding: 15px; background: rgba(0, 10, 0, 0.9); font-size: 13px; }
        .lb-title { color: #f2a900; font-weight: bold; text-align: center; margin-bottom: 12px; border-bottom: 1px solid #0f0; padding-bottom: 5px; }
        .lb-row { display: flex; justify-content: space-between; margin-bottom: 6px; }

        #visual-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 100; justify-content: center; align-items: center; flex-direction: column; }
        #visual-box { border: 2px solid #0f0; padding: 20px; background: #000; text-align: center; box-shadow: 0 0 40px #0f0; max-width: 450px; }
        #visual-box img { max-width: 100%; height: auto; border: 1px solid #050; margin-bottom: 15px; }

        #boot-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; color: #0f0; z-index: 200; padding: 30px; box-sizing: border-box; overflow: hidden; }
        #boot-history { white-space: pre-wrap; line-height: 1.4; font-size: 16px; }

        @media (max-width: 768px) { #side-panel { display: none !important; } #history, .input-line { padding-right: 0; } }
    </style>
</head>
<body onclick="document.getElementById('cmd').focus()">

<canvas id="matrix-canvas"></canvas>

<div id="boot-screen">
    <div id="boot-history">ZeroDayWear_OS [Uplink Initialized]</div>
</div>

<div id="side-panel">
    <div id="live-feed">
        <span style="color:red; animation: blink 1s infinite;">●</span> SATELLITE_UPLINK<br>
        NODES: <span id="active-nodes">--</span> ACTIVE<br>
        LOC: IRAN_SECTOR_07
    </div>
    <div id="leaderboard">
        <div class="lb-title">[ TOP_OPERATIVES ]</div>
        <div id="lb-content"></div>
    </div>
</div>

<div id="terminal">
    <div id="history">ZeroDay_OS [v2.9.7-GOLD]
Connection stable. Use 'ls' to browse files.</div>
    <div class="input-line">
        <span class="prompt" id="current-prompt">guest@zerodaywear:~$</span>
        <input type="text" id="cmd" autocomplete="off" spellcheck="false" autofocus>
    </div>
</div>

<div id="visual-overlay" onclick="closeVisual()">
    <div id="visual-box">
        <img id="target-img" src="" alt="">
        <p id="target-name" style="font-weight:bold;"></p>
        <p id="target-price" style="color:#fff;"></p>
        <div id="target-desc" style="font-size:14px; text-align:left;"></div>
        <div style="font-size: 10px; color: #444; margin-top: 15px;">CLICK TO DISCONNECT</div>
    </div>
</div>

<script>
    const input = document.getElementById('cmd');
    const history = document.getElementById('history');
    const terminal = document.getElementById('terminal');
    const nodesDisplay = document.getElementById('active-nodes');

    // Matrix Rain
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const drops = Array(Math.floor(canvas.width / 16)).fill(1);
    function drawMatrix() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#0f0'; ctx.font = '16px Courier New';
        drops.forEach((y, i) => {
            ctx.fillText(String.fromCharCode(0x30A0 + Math.random() * 96), i * 16, y * 16);
            if (y * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(drawMatrix, 35);

    // Boot
    const bootLines = ["[ OK ] BIOS Check", "[ OK ] RAM: 32GB ECC", "[ OK ] PROXY: TEHRAN_07_BYPASS", "[ !! ] ENCRYPTING CHANNEL...", "[ OK ] READY FOR DEPLOYMENT"];
    let bIdx = 0;
    function runBoot() {
        if (bIdx < bootLines.length) {
            document.getElementById('boot-history').innerHTML += bootLines[bIdx] + "\n";
            bIdx++; setTimeout(runBoot, 120);
        } else {
            setTimeout(() => { 
                document.getElementById('boot-screen').style.display='none'; 
                terminal.style.display='block'; 
                document.getElementById('side-panel').style.display='block'; 
                input.focus(); 
            }, 500);
        }
    }
    window.onload = runBoot;

    // Filesystem & Products
    let currentDir = 'root';
    const filesystem = {
        'root': ['manifesto.txt', 'privacy.txt', 'afterpayment.txt', 'tshirts/', 'hoodies/'],
        'tshirts': ['infiltrate-v1'],
        'hoodies': ['dark-node-v2']
    };

    const products = {
        'infiltrate-v1': { 
            name: 'TEE: INFILTRATE', 
            price: '$30.00', 
            img: 'infiltrate-secure.jpeg', 
            desc: 'Heavy tactical cotton. Real physical shipment.', 
            link: 'https://nowpayments.io/payment/?iid=XXXXX' // BURAYA KENDİ LİNKİNİ YAPIŞTIR
        },
        'dark-node-v2': { 
            name: 'HOODIE: DARK NODE', 
            price: '$60.00', 
            img: 'black-hoodie.jpg', 
            desc: 'Premium stealth hoodie. Physical product.', 
            link: 'https://nowpayments.io/payment/?iid=YYYYY' // BURAYA KENDİ LİNKİNİ YAPIŞTIR
        }
    };

    const contentManifesto = `<span style="color:#f2a900">[ MANIFESTO ]</span>\nAnonymity is a human right. We are a physical bridge to digital freedom. Proceeds fund Starlink kits and VPN hardware for silenced regions in Iran. "The walls must fall."`;
    const contentPrivacy = `<span style="color:#f2a900">[ PRIVACY ]</span>\nNo logs. No tracking. RAM-only storage. We use crypto-routing to ensure your financial identity is never linked to your address.`;
    const contentAfterpayment = `<span style="color:#f2a900">[ POST-PAYMENT ]</span>\nSuccess. Send your TXID and shipping alias to: <span style="color:#fff">azurany@proton.me</span>. Use PGP if possible. Stealth packaging guaranteed.`;
    const contentHidden = `<span style="color:#ff0000">[!] IRAN FIELD REPORT [!]</span>\nThe regime cuts the cables to hide their crimes. Families are isolated, medical help is blocked, and youth are targeted for documenting truth. We ship hardware directly into these zones to break the silence.`;

    const leaders = [{n:"Ghost_Node", u:14}, {n:"Null_Pointer", u:11}, {n:"Persian_Wolf", u:9}, {n:"Root_Admin", u:7}, {n:"Zero_Sum", u:5}];
    document.getElementById('lb-content').innerHTML = leaders.map(l => `<div class="lb-row"><span>${l.n}</span><span>${l.u}u</span></div>`).join('');

    function startGlitch() { terminal.classList.add('glitching'); setTimeout(() => terminal.classList.remove('glitching'), 350); }

    // Logic
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Tab') {
            e.preventDefault();
            const val = input.value.split(' ').pop();
            const pool = [...filesystem[currentDir], 'help','ls','cd','cat','info','buy','status','clear', '.hidden.txt'];
            const match = pool.find(s => s.startsWith(val));
            if (match) {
                const parts = input.value.split(' ');
                parts[parts.length - 1] = match;
                input.value = parts.join(' ');
            }
        }
        if (e.key === 'Enter') {
            const full = input.value.trim();
            const [cmd, arg] = full.split(' ');
            history.innerHTML += `\n<span style="color:#555">${document.getElementById('current-prompt').innerText} ${full}</span>\n`;

            if (cmd === 'status' || !['ls','help','cd','cat','info','buy','clear'].includes(cmd)) startGlitch();

            switch(cmd.toLowerCase()) {
                case 'ls':
                    if (full === 'ls -a' && currentDir === 'root') history.innerHTML += filesystem.root.join('  ') + "  .hidden.txt\n";
                    else history.innerHTML += filesystem[currentDir].join('  ') + "\n";
                    break;
                case 'cd':
                    const target = arg ? arg.replace('/','') : '';
                    if (!target || target === '..' || target === 'root') {
                        currentDir = 'root';
                    } else if (filesystem[target]) {
                        currentDir = target;
                    } else {
                        history.innerHTML += "cd: directory not found\n";
                    }
                    document.getElementById('current-prompt').innerText = `guest@zerodaywear:~/${currentDir === 'root' ? '' : currentDir}$`;
                    break;
                case 'cat':
                    if (arg === 'manifesto.txt') history.innerHTML += contentManifesto + "\n";
                    else if (arg === 'privacy.txt') history.innerHTML += contentPrivacy + "\n";
                    else if (arg === 'afterpayment.txt') history.innerHTML += contentAfterpayment + "\n";
                    else if (arg === '.hidden.txt' && currentDir === 'root') history.innerHTML += contentHidden + "\n";
                    else history.innerHTML += "cat: file not found.\n";
                    break;
                case 'info':
                    if(products[arg]) showVisual(arg); 
                    else history.innerHTML += "Use 'info [item_name]'. Example: info infiltrate-v1\n"; 
                    break;
                case 'buy':
                    if(products[arg]) {
                        history.innerHTML += `<span style="color:#f2a900">[!] REDIRECTING TO SECURE PAYMENT NODE...</span>\n`;
                        setTimeout(() => { window.open(products[arg].link, '_blank'); }, 1000);
                    } else {
                        history.innerHTML += "Item not found. Try: buy infiltrate-v1\n";
                    }
                    break;
                case 'status': history.innerHTML += "> UPLINK: STABLE\n> NODES: " + nodesDisplay.innerText + "\n> BYPASS: ACTIVE\n"; break;
                case 'clear': history.innerHTML = "Terminal Ready."; break;
                case 'help': history.innerHTML += "ls, ls -a, cat [file], cd [dir], info [item], buy [item], status, clear\n"; break;
                default: history.innerHTML += `Command '${cmd}' not found.\n`;
            }
            input.value = ''; terminal.scrollTo(0, terminal.scrollHeight);
        }
    });

    function showVisual(id) {
        const p = products[id];
        document.getElementById('target-img').src = p.img;
        document.getElementById('target-name').innerText = p.name;
        document.getElementById('target-price').innerText = "PRICE: " + p.price;
        document.getElementById('target-desc').innerHTML = p.desc;
        document.getElementById('visual-overlay').style.display = 'flex';
    }
    function closeVisual() { document.getElementById('visual-overlay').style.display = 'none'; input.focus(); }
    setInterval(() => { nodesDisplay.innerText = 18 + Math.floor(Math.random() * 12); }, 3000);
</script>
</body>
</html>
