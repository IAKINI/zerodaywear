<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroDayWear | Deployment Terminal</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; margin: 0; overflow: hidden; font-size: 18px; }
        #terminal { width: 100vw; height: 100vh; padding: 20px; box-sizing: border-box; overflow-y: auto; position: relative; z-index: 1; }
        #history { white-space: pre-wrap; line-height: 1.5; margin-bottom: 10px; }
        .input-line { display: flex; align-items: center; }
        #cmd { background: transparent; border: none; color: #0f0; font-family: inherit; font-size: inherit; outline: none; flex: 1; caret-color: #0f0; }
        .prompt { font-weight: bold; margin-right: 10px; color: #0f0; }
        
        /* CRT SCANLINE EFFECT */
        #terminal::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 2px, 3px 100%; pointer-events: none; z-index: 2;
        }

        /* VISUAL POP-UP (DECRYPTION OVERLAY) */
        #visual-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 100; justify-content: center; align-items: center; flex-direction: column;
        }
        #visual-box { border: 2px solid #0f0; padding: 15px; background: #000; text-align: center; box-shadow: 0 0 30px #0f0; max-width: 450px; }
        #visual-box img { max-width: 100%; height: auto; border: 1px solid #050; margin-bottom: 15px; }
        #visual-box p { margin: 5px 0; color: #0f0; font-size: 16px; }
        .close-hint { font-size: 10px; color: #666; margin-top: 10px; text-transform: uppercase; }
    </style>
</head>
<body onclick="document.getElementById('cmd').focus()">

<div id="terminal">
    <div id="history">ZeroDay_OS [Version 2.6.0-STABLE]
(c) 2026 ZeroDayWear Operative Systems.
Type 'help' to see available commands.
[!] Deployment target: zerodaywear.com</div>
    <div class="input-line">
        <span class="prompt">guest@zerodaywear:~$</span>
        <input type="text" id="cmd" autofocus autocomplete="off" spellcheck="false">
    </div>
</div>

<div id="visual-overlay" onclick="closeVisual()">
    <div id="visual-box">
        <div style="color:#0f0; font-size: 12px; margin-bottom: 10px;">[ VISUAL_DECRYPTION_MODE ]</div>
        <img id="target-img" src="" alt="Loading Data...">
        <p id="target-name" style="font-weight:bold;"></p>
        <p id="target-price" style="color:#fff;"></p>
        <p id="target-desc"></p>
        <div class="close-hint">Click anywhere to close connection</div>
    </div>
</div>

<script>
    const input = document.getElementById('cmd');
    const history = document.getElementById('history');
    const terminal = document.getElementById('terminal');
    const overlay = document.getElementById('visual-overlay');

    // --- FILE SYSTEM & PRODUCTS ---
    const filesystem = {
        'tshirts': ['infiltrate-v1', 'null-pointer'],
        'hoodies': ['dark-node-v2'],
        'about': ['mission.txt', 'privacy.txt']
    };

    const products = {
        'infiltrate-v1': {
            name: 'PAYLOAD: INFILTRATE & SECURE',
            price: '$20.68',
            img: 'infiltrate-secure.jpg', // GitHub'daki dosya adı
            desc: 'Heavy cotton, oversized fit. Anti-tracking graphics.'
        }
    };

    const baseCommands = ['help', 'ls', 'info', 'buy', 'clear', 'exit'];

    // --- KEYBOARD ENGINE ---
    input.addEventListener('keydown', function(e) {
        // TAB AUTO-COMPLETE
        if (e.key === 'Tab') {
            e.preventDefault();
            const val = input.value.trim().toLowerCase();
            if (!val) return;

            const allSuggestions = [...baseCommands, ...Object.keys(filesystem), ...Object.keys(products)];
            const match = allSuggestions.find(s => s.startsWith(val));
            if (match) input.value = match;
        }

        // EXECUTE COMMAND
        if (e.key === 'Enter') {
            const fullVal = input.value.trim();
            if (!fullVal) return;
            
            const parts = fullVal.split(' ');
            const cmd = parts[0].toLowerCase();
            const arg = parts[1];

            history.innerHTML += `\n<span style="color:#555">guest@zerodaywear:~$ ${fullVal}</span>\n`;

            switch(cmd) {
                case 'help':
                    history.innerHTML += `Commands: ls [dir], info [item], buy [item], clear, help\n`;
                    break;
                case 'ls':
                    if (!arg) {
                        history.innerHTML += `<span style="color:#555ff">tshirts/   hoodies/   about/</span>\n`;
                    } else if (filesystem[arg]) {
                        history.innerHTML += filesystem[arg].join('   ') + '\n';
                    } else {
                        history.innerHTML += `ls: cannot access '${arg}': No such directory\n`;
                    }
                    break;
                case 'info':
                    if (products[arg]) {
                        history.innerHTML += `[!] Initializing visual decryption for ${arg}...\n`;
                        showVisual(arg);
                    } else {
                        history.innerHTML += `Error: Item '${arg}' not found. Try 'ls tshirts'\n`;
                    }
                    break;
                case 'buy':
                    if (products[arg]) {
                        history.innerHTML += `<span style="color:#f2a900">[!] ROUTING TO SECURE CRYPTO NODE...</span>\n`;
                        setTimeout(() => { window.location.href = "https://nowpayments.io/payment/YOUR_LINK"; }, 1500);
                    } else {
                        history.innerHTML += `Error: Item '${arg}' not found.\n`;
                    }
                    break;
                case 'clear':
                    history.innerHTML = 'ZeroDay_OS Terminal [Ready]';
                    break;
                default:
                    history.innerHTML += `Command '${cmd}' not recognized. Type 'help' for assistance.\n`;
            }

            input.value = '';
            terminal.scrollTo(0, terminal.scrollHeight);
        }
    });

    function showVisual(id) {
        const p = products[id];
        document.getElementById('target-img').src = p.img;
        document.getElementById('target-name').innerText = p.name;
        document.getElementById('target-price').innerText = `Unit Price: ${p.price}`;
        document.getElementById('target-desc').innerText = p.desc;
        overlay.style.display = 'flex';
    }

    function closeVisual() {
        overlay.style.display = 'none';
        input.focus();
    }
</script>
</body>
</html>
